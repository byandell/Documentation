plugins:
  - jekyll-relative-links
  - jekyll-remote-theme
relative_links:
  enabled: true
  collections: true
include:
  - AI_prompts.md
  - AI.md
  - envsys.md
  - geospatial.md
  - github.md
  - index.md
  - kernel.md
  - python_references.md
  - python_strategy.md
  - quarto.md
  - radian.md
  - R.md
  - ShinyApps.md
  - verde_models.csv

remote_theme: just-the-docs/just-the-docs

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default